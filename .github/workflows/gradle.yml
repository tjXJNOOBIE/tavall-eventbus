name: Gradle

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Tavall build dependencies
        run: |
          git clone --depth 1 https://github.com/TavallStudios/tavall-logging.git "$RUNNER_TEMP/tavall-logging"
          cat > "$RUNNER_TEMP/tavall-version.init.gradle" <<'GRADLE'
          gradle.afterProject { project, state ->
              if (!state.failure) {
                  project.version = "1.0.0"
              }
          }
          GRADLE
          "$RUNNER_TEMP/tavall-logging/gradlew" -p "$RUNNER_TEMP/tavall-logging" \
            --no-daemon --max-workers=1 -I "$RUNNER_TEMP/tavall-version.init.gradle" \
            -x test publishToMavenLocal
      - run: ./gradlew --no-daemon clean check publishToMavenLocal
